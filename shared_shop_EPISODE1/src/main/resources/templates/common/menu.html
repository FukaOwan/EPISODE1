<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
</head>

<body>
	<ul th:fragment="layout-menu" th:class="navi_menu">
		<!--構造を一部編集（伊藤）-->
		<li><a th:href="@{/}" th:classappend="${currentPage == 'top'} ? 'current'">
				<span class="hover-underline" th:text="#{top}"></span></a></li>
		<li><a th:href="@{/client/item/list/1}" th:classappend="${currentPage == 'item-list'} ? 'current'">
				<span class="hover-underline" th:text="#{item}+#{title.list}"></span></a></li>
		<li><a th:href="@{/client/basket/list}" th:classappend="${currentPage == 'basket-list'} ? 'current'">
				<span class="hover-underline" th:text="#{basket}"></span></a></li>
		<th:block th:if="${session.user != null}">
			<li><a th:href="@{/client/order/list}" th:classappend="${currentPage == 'order-list'} ? 'current'">
					<span class="hover-underline" th:text="#{order}+#{title.list}"></span></a></li>
		</th:block>
	</ul>
</body>

</html>
