<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title,body)">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/layout.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/stylesheet.css}" />
	<!-- グーグルフォントの利用（一般権限画面） -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Tsukimi+Rounded:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap"
		rel="stylesheet">

	<title th:replace="${title}"></title>
</head>

<body class="user">
	<!--/* ヘッダー */-->
	<header>
		<div th:replace="~{common/header :: layout-header}"></div>
	</header>
	<!--/* ナビゲーションバー */-->
	<nav th:if="${session.user == null or session.user.authority == 2}" class="navi_area">
		<div th:replace="~{common/menu :: layout-menu}"></div>
	</nav>
	<!--メインビジュアル追加（伊藤）-->
	<section class="main-visual" th:if="${currentPage == 'top'}">
		<img th:src="@{/images/main-visual.jpg}" alt="メインビジュアル">
	</section>

	<div class="container">
		<!--/* サイドバー */-->
		<aside th:replace="~{common/sidebar :: layout-sidebar}"></aside>

		<!--/* メイン */-->
		<article class="main">
			<div th:replace="${body}"></div>
		</article>
	</div>
	<!--発送情報バナー（伊藤）-->
	<div class="shipping-banner">
		<p>平日・土曜 <span class="under-line">14時まで</span>のご注文は<span class="highlight">当日発送！</span></p>
	</div>

	<!--topへ戻るボタン（伊藤）-->
	<button type="button" class="page-top_button" aria-label="ページ上部へ戻る">
		↑
	</button>

	<!--/* フッター */-->
	<footer class="footer">
		<div th:replace="~{common/footer :: layout-footer}"></div>
	</footer>

	<!--JS（伊藤）-->
	<script>
		document.addEventListener("DOMContentLoaded", () => {
			initShippingBanner();
			initPageTopButton();
		});

		/* ========================================
		   当日発送バナー
		======================================== */

		function initShippingBanner() {
			const banner = document.querySelector(".shipping-banner");
			const mainVisual = document.querySelector(".main-visual");
			const footer = document.querySelector("footer");

			// バナーがないページでは何もしない
			if (!banner) {
				return;
			}

			let isFooterVisible = false;
			let ticking = false;

			const updateBanner = () => {
				let overlapsMainVisual = false;

				// メインビジュアルがあるページだけ判定
				if (mainVisual) {
					const bannerTop =
						window.innerHeight - banner.offsetHeight;

					const mainVisualBottom =
						mainVisual.getBoundingClientRect().bottom;

					overlapsMainVisual =
						mainVisualBottom > bannerTop;
				}

				banner.classList.toggle(
					"is-hidden",
					overlapsMainVisual || isFooterVisible
				);

				ticking = false;
			};

			if (footer) {
				const footerObserver = new IntersectionObserver(
					([entry]) => {
						isFooterVisible = entry.isIntersecting;
						updateBanner();
					},
					{
						threshold: 0.01
					}
				);

				footerObserver.observe(footer);
			}

			window.addEventListener(
				"scroll",
				() => {
					if (!ticking) {
						requestAnimationFrame(updateBanner);
						ticking = true;
					}
				},
				{
					passive: true
				}
			);

			window.addEventListener("resize", updateBanner);

			updateBanner();
		}


		/* ========================================
		   ページ上部へ戻るボタン
		======================================== */

		function initPageTopButton() {
			const pageTopButton =
				document.querySelector(".page-top_button");

			// ボタンがないページでは何もしない
			if (!pageTopButton) {
				return;
			}

			const updatePageTopButton = () => {
				// 500px以上スクロールしたら表示
				pageTopButton.classList.toggle(
					"is-visible",
					window.scrollY >= 500
				);
			};

			window.addEventListener(
				"scroll",
				updatePageTopButton,
				{
					passive: true
				}
			);

			pageTopButton.addEventListener("click", () => {
				window.scrollTo({
					top: 0,
					behavior: "smooth"
				});
			});

			updatePageTopButton();
		}
    const body = document.body;
	let lastX = 0; 
	let lastY = 0; 
	const distanceThreshold = 70; 

	document.addEventListener('mousemove', (e) => {
    const deltaX = e.clientX - lastX;
    const deltaY = e.clientY - lastY;
    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

    if (distance > distanceThreshold) {
        const footprint = document.createElement('div');
        footprint.className = 'footprint';
        
        // 足跡の生成位置
        footprint.style.left = e.clientX + 'px';
        footprint.style.top = e.clientY + 'px';
        
        const img = document.createElement('img');
        img.src = '/shared_shop/images/nikukyu.png'; 
        img.style.width = '20px'; 
        footprint.appendChild(img);

        body.appendChild(footprint);

        setTimeout(() => footprint.remove(), 1000);

        lastX = e.clientX;
        lastY = e.clientY;
    }
});
	</script>
</body>

</html>
